<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AgentBridge</title>
<meta name="theme-color" content="#D83B01">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="app-192.png">
<link rel="apple-touch-icon" href="app-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="titlebar">
  <div class="app-glyph">
    <svg viewBox="0 0 32 32" width="20" height="20"><path d="M4 22c3.5-8 20.5-8 24 0M4 22v-4M28 22v-4" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
  </div>
  <span class="app-name">AgentBridge</span>
  <span class="spacer"></span>
  <span id="paused-badge" class="badge-paused" hidden>⏸ Paused</span>
</header>

<div id="shell">
  <nav id="navrail">
    <div id="side-head">
      <span class="side-title">Chats</span>
    </div>
    <div id="side-chats"><div class="empty" style="padding:20px 0">…</div></div>
    <button id="side-new" class="fab" title="New chat">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M5 19 17 7l3-1.8L21.8 7 20 10 8 22H5zM4 21.5l1.2-1.2" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <a id="side-account" href="#/settings" title="Settings">
      <span class="acct-avatar" id="acct-avatar">?</span>
      <span id="acct-name" style="flex:1">Sign in</span>
    </a>
  </nav>
  <div id="side-resizer" title="Drag to resize"></div>

  <main id="content"></main>
</div>

<div id="toast" hidden></div>

<script src="app.js"></script>
</body>
</html>
